name: Run Pytest

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[test]'

      - name: Run tests
        run: |
          pytest -q

  toolkit-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout changes
        uses: actions/checkout@v4
        with:
          path: changes

      - name: Checkout digitone-syx-toolkit
        uses: actions/checkout@v4
        with:
          repository: emnyeca/digitone-syx-toolkit
          path: digitone-syx-toolkit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install digitone-syx-toolkit
        run: python -m pip install -e ./digitone-syx-toolkit

      - name: Install changes
        run: python -m pip install -e './changes[test]'

      - name: Run Track 8 toolkit integration tests
        working-directory: changes
        run: |
          python -m pytest -q \
            tests/test_track8_toolkit_loader_validation.py \
            tests/test_track8_sysex_export.py \
            tests/test_track8_fixture_generation.py \
            tests/test_track8_product_like_fixture_generation.py \
            tests/test_track8_export_api.py \
            tests/test_track8_export_cli.py